name: Build and Publish Release

on:
  schedule:
    # Scheduled Daily (Midnight)
    - cron: '0 0 * * *'
  workflow_dispatch:

# Environment
env:
  SKIP_BUILD: false
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# Prevent overlapping publishes if tags get pushed in quick succession.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      # Checkout repository
      - name: Checkout (full history + tags)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      # Install Inkscape, XVFB, GitHub CLI
      - name: Install Inkscape
        run: |
          sudo apt-get update
          sudo add-apt-repository ppa:inkscape.dev/stable
          sudo apt-get update
          sudo apt-get install -y inkscape xvfb gh

      # Set-up Python 3.12 (uv)
      - name: Set up uv (Python 3.12 + cache)
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      # Install Node, NPM and SVGO
      - name: Install Node / NPM
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'

      # Sync Deps, Optimize, and Package
      - name: Sync Deps, Optimize, and Package
        run: |
          set -euo pipefail
          uv sync --extra dev --locked
          uv run vectors build .

      # Push Changes
      - name: Push Changes
        run: |
          git add .
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git commit -m "build(gh): Process daily updates." || { echo "No changes to commit, skipping build process."; echo "SKIP_BUILD=true" >> $GITHUB_ENV; exit 0; }
          git push || { echo "No changes to push, skipping build process.";  echo "SKIP_BUILD=true" >> $GITHUB_ENV; exit 0; }
          uv run cz -nr 21,16,7 bump --yes
          git push && git push --tags

      # Generate release tag
      - name: Generate Release Tag
        id: generate_tag
        if: ${{ env.SKIP_BUILD != 'true' }}
        run: |
          VERSION=$(uv version --short)
          DATE=$(date +%Y%m%d)
          DATE_FMT=$(date +'%Y-%m-%d')
          echo "PROJECT_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "DATE_FMT=${DATE_FMT}" >> $GITHUB_ENV
          echo "VERSION_TAG=v${VERSION}+${DATE}" >> $GITHUB_ENV
          CHANGELOG="$(uv run cz changelog "$VERSION" --dry-run)"
          {
            echo "## Daily Build (${DATE_FMT})"
            echo
            echo "This is an automated daily release that ingests changes to the SVG catalog and live Scryfall data. A new"
            echo "release does not mean the codebase has changed. The version tag for automated releases and the manifest file"
            echo "is comprised of the codebase version + the day this release was generated in \`YYYYMMDD\` format."
            echo
            echo "### Release Files"
            echo
            echo "Two packages are provided, the \`all\` package contains both the original SVG files and the optimized"
            echo "versions. The \`optimized\` package only contains the optimized SVG files. Both packages include a"
            echo "\`manifest.json\` file which provides helpful compatibility and routing data. Generally, the optimized"
            echo "SVG files are recommended for production use, typically saving about 30-50% in filesize and providing"
            echo "improved formatting compatibility across use cases."
            echo
            echo "### Changelog"
            echo
            echo "${CHANGELOG}"
            echo
            echo "[See full changelog.](https://github.com/Investigamer/mtg-vectors/blob/main/CHANGELOG.md)"
          } > RELEASE_NOTES.md

      # Publish Release
      - name: Publish Release
        id: create_release
        uses: actions/create-release@v1
        if: ${{ env.SKIP_BUILD != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.VERSION_TAG }}
          release_name: ${{ env.VERSION_TAG }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false

      # Upload Release Package (All)
      - name: Upload Release Package (All)
        uses: actions/upload-release-asset@v1
        if: ${{ env.SKIP_BUILD != 'true' }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: mtg-vectors.all.zip
          asset_name: mtg-vectors.all.zip
          asset_content_type: application/zip

      # Upload Release Package (Optimized)
      - name: Upload Release Package (Optimized)
        uses: actions/upload-release-asset@v1
        if: ${{ env.SKIP_BUILD != 'true' }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: mtg-vectors.optimized.zip
          asset_name: mtg-vectors.optimized.zip
          asset_content_type: application/zip
